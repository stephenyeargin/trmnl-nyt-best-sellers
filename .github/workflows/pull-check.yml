name: Verify trmnlp pull is clean

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  pull-check:
    name: Pull upstream and open/update sync PR
    runs-on: ubuntu-latest
    env:
      SYNC_BRANCH: chore/trmnlp-upstream-sync
      BASE_BRANCH: ${{ github.event.repository.default_branch }}
      PR_TITLE: "chore: sync plugin files from trmnlp pull"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true

      - name: Install trmnlp
        run: gem install trmnl_preview

      - name: Create trmnlp config directory
        run: mkdir -p ~/.config/trmnlp

      - name: Create trmnlp config file
        run: |
          cat > ~/.config/trmnlp/config.yml << EOF
          ---
          api_key: ${{ secrets.TRMNL_API_KEY }}
          EOF

      - name: Run trmnlp pull
        run: trmnlp pull --force

      - name: Detect repository changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Detected file changes after trmnlp pull."
            git status --short
            git --no-pager diff
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No file changes detected after trmnlp pull."
          fi

      - name: Commit and force-push sync branch
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B "$SYNC_BRANCH"
          git add -A
          git commit -m "$PR_TITLE"
          git push --force --set-upstream origin "$SYNC_BRANCH"

      - name: Check for existing sync PR
        if: steps.changes.outputs.changed == 'true'
        id: existing-pr
        uses: actions/github-script@v7
        with:
          script: |
            const [owner, repo] = process.env.GITHUB_REPOSITORY.split('/');
            const head = `${owner}:${process.env.SYNC_BRANCH}`;
            const base = process.env.BASE_BRANCH;

            const { data: pulls } = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head,
              base,
              per_page: 1,
            });

            core.setOutput('exists', pulls.length > 0 ? 'true' : 'false');

      - name: Create sync PR
        if: steps.changes.outputs.changed == 'true' && steps.existing-pr.outputs.exists == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const [owner, repo] = process.env.GITHUB_REPOSITORY.split('/');
            const base = process.env.BASE_BRANCH;
            const head = process.env.SYNC_BRANCH;
            const title = process.env.PR_TITLE;
            const body = [
              'Automated update generated by `trmnlp pull --force`.',
              '',
              '- Trigger: manual workflow dispatch',
              '- Behavior: branch is force-pushed on every run when upstream changes exist',
            ].join('\n');

            await github.rest.pulls.create({
              owner,
              repo,
              title,
              head,
              base,
              body,
            });

      - name: Report PR update
        if: steps.changes.outputs.changed == 'true' && steps.existing-pr.outputs.exists == 'true'
        run: echo "Updated existing sync PR by force-pushing branch $SYNC_BRANCH"